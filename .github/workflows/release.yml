name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate manifest version against tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [[ "${TAG_VERSION}" != "${MANIFEST_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match manifest version (${MANIFEST_VERSION})."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build bundled main.js
        run: npm run build

      - name: Ensure styles.css exists
        shell: bash
        run: |
          if [[ ! -f styles.css ]]; then
            echo "/* Placeholder styles for Obsidian community release */" > styles.css
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
